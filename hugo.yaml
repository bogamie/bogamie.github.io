baseURL: "https://bogamie.github.io/"
title: "Home"
paginate: 5
theme: "PaperMod"

buildDrafts: false
buildFuture: false
buildExpired: false

params:
  env: production
  author: "Kim Bogyeom"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  comments: false

  # TOC 활성화
  ShowToc: true
  TocOpen: true

  profileMode:
    enabled: true
    title: "Kim Bogyeom"
    imageUrl: "./img/profile.jpg"
    imageWidth: 180
    imageHeight: 180

  socialIcons:
    - name: github
      url: "https://github.com/Bogamie"
    - name: email
      url: "mailto:bogamie02@gmail.com"

menu:
  main:
    - identifier: about
      name: About Me
      url: /about/
      weight: 10
    - identifier: research
      name: Research
      url: /research/
      weight: 20
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 30
    - identifier: posts
      name: Posts
      url: /posts/
      weight: 40

pygmentsUseClasses: true

markup:
  highlight:
    noClasses: false

  tableOfContents:
    startLevel: 1
    endLevel: 6
    ordered: false