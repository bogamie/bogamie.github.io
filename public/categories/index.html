document.addEventListener("DOMContentLoaded", () => {
  const tocWrapper = document.querySelector(".toc-wrapper");
  if (!tocWrapper) return;

   
  const tocTitle = tocWrapper.dataset.tocTitle;
  if (tocTitle) {
    for (const ul of tocWrapper.querySelectorAll("nav#TableOfContents > ul")) {
      const li = document.createElement("li");
      const a = document.createElement("a");
      a.href = "#";
      a.textContent = tocTitle;
      li.appendChild(a);
      ul.prepend(li);
    }
  }

   
  const allLinks = Array.from(tocWrapper.querySelectorAll('a[href^="#"]'));
  const titleLinks = allLinks.filter((a) => a.hash === "" || a.hash === "#");
  const tocLinks = allLinks.filter((a) => a.hash !== "" && a.hash !== "#");
  if (!tocLinks.length) return;

   
  const headings = tocLinks
    .map((link) => document.getElementById(decodeURIComponent(link.hash.slice(1))))
    .filter(Boolean);
  if (!headings.length) return;

  const OFFSET = 100;
  let activeId = null;

  function setActive(id) {
    if (activeId === id) return;
    activeId = id;

    for (const link of titleLinks) {
      link.classList.toggle("active", id === "__top__");
    }
    for (const link of tocLinks) {
      link.classList.toggle(
        "active",
        decodeURIComponent(link.hash.slice(1)) === id
      );
    }
  }

  function updateActive() {
     
    if (window.innerHeight + window.scrollY >= document.body.scrollHeight - 2) {
      setActive(headings.at(-1).id);
      return;
    }

     
    let current = null;
    for (const h of headings) {
      if (h.getBoundingClientRect().top <= OFFSET) current = h;
      else break;
    }

    setActive(current ? current.id : "__top__");
  }

   
  let ticking = false;
  const onScroll = () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      updateActive();
      ticking = false;
    });
  };

  window.addEventListener("scroll", onScroll, { passive: true });
  window.addEventListener("resize", onScroll, { passive: true });
  updateActive();
});
</script>


<script>
(() => {
  const overlay = document.createElement("div");
  overlay.className = "lightbox-overlay";
  const zoomImg = document.createElement("img");
  overlay.appendChild(zoomImg);
  document.body.appendChild(overlay);

  function close() {
    overlay.classList.remove("active");
  }

  overlay.addEventListener("click", close);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") close();
  });

  document.querySelectorAll(".post-content img").forEach((img) => {
    img.addEventListener("click", (e) => {
      e.stopPropagation();
      zoomImg.src = img.src;
      zoomImg.alt = img.alt;

       
      if (img.src.includes("#dark-invert")) {
        zoomImg.classList.add("dark-invert");
      } else {
        zoomImg.classList.remove("dark-invert");
      }

      overlay.classList.add("active");
    });
  });
})();
</script>


<script>
    let menu = document.getElementById('menu');
    if (menu) {
        
        const scrollPosition = localStorage.getItem("menu-scroll-position");
        if (scrollPosition) {
            menu.scrollLeft = parseInt(scrollPosition, 10);
        }
        
        menu.onscroll = function () {
            localStorage.setItem("menu-scroll-position", menu.scrollLeft);
        }
    }

    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
        anchor.addEventListener("click", function (e) {
            e.preventDefault();
            var id = this.getAttribute("href").substr(1);
            if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView({
                    behavior: "smooth"
                });
            } else {
                document.querySelector(`[id='${decodeURIComponent(id)}']`).scrollIntoView();
            }
            if (id === "top") {
                history.replaceState(null, null, " ");
            } else {
                history.pushState(null, null, `#${id}`);
            }
        });
    });

</script>
<script>
    var mybutton = document.getElementById("top-link");
    window.onscroll = function () {
        if (document.body.scrollTop > 800 || document.documentElement.scrollTop > 800) {
            mybutton.style.visibility = "visible";
            mybutton.style.opacity = "1";
        } else {
            mybutton.style.visibility = "hidden";
            mybutton.style.opacity = "0";
        }
    };

</script>
<script>
    document.getElementById("theme-toggle").addEventListener("click", () => {
        const html = document.querySelector("html");
        if (html.dataset.theme === "dark") {
            html.dataset.theme = 'light';
            localStorage.setItem("pref-theme", 'light');
        } else {
            html.dataset.theme = 'dark';
            localStorage.setItem("pref-theme", 'dark');
        }
    })

</script>
